[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "recallium"
version = "0.1.0"
description = "Recallium Core local memory engine"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
recallium = "recallium.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"

[tool.pyright]
pythonVersion = "3.11"
include = ["src", "tests"]

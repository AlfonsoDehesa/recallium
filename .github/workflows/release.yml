name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_PREFIX="${VERSION#v}"

          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md is required for releases" >&2
            exit 1
          fi

          sed -n "/^## v\{0,1\}${VERSION_NO_PREFIX}/,/^## /p" CHANGELOG.md | sed '$d' > body.md

          if [ ! -s body.md ]; then
            echo "CHANGELOG.md has no section for ${VERSION}" >&2
            exit 1
          fi

          {
            echo "CHANGELOG<<EOF"
            cat body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          generate_release_notes: true

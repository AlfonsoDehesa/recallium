name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest --cov=src/recollectium --cov-report=term-missing

  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            shell: bash
          - name: linux-arm64
            os: ubuntu-24.04-arm
            shell: bash
          - name: macos-intel
            os: macos-14
            shell: bash
          - name: macos-apple-silicon
            os: macos-15
            shell: bash
          - name: windows-x86_64
            os: windows-latest
            shell: pwsh
          - name: windows-arm64
            os: windows-11-arm
            shell: pwsh
    name: install-smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Recollectium on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: sh ./install.sh
        env:
          RECOLLECTIUM_INSTALL_REF: ${{ github.head_ref || github.ref_name }}

      - name: Install Recollectium on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1
        env:
          RECOLLECTIUM_INSTALL_REF: ${{ github.head_ref || github.ref_name }}

      - name: Verify Recollectium on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          recollectium --version

      - name: Verify Recollectium on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: recollectium --version
